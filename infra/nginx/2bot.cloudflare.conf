# ============================================================================
# 2bot.org - User Dashboard & Admin Panel Nginx Configuration with SSL
# Server IP: 207.180.226.85
# Domains: 2bot.org, www.2bot.org, admin.2bot.org, api.2bot.org
# SSL for Cloudflare Full mode
# Created: 2025-12-26
# ============================================================================

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Rate limiting zones (shared with analyticbot if both loaded)
limit_req_zone $binary_remote_addr zone=2bot_api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=2bot_general_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=2bot_auth_limit:10m rate=5r/s;

# Upstream definition (same as frontend_backend in analyticbot config)
upstream 2bot_frontend {
    server 127.0.0.1:11300;
    keepalive 32;
}

upstream 2bot_api {
    server 127.0.0.1:11400;
    keepalive 32;
}

upstream 2bot_admin {
    server 127.0.0.1:11310;
    keepalive 32;
}

# ============================================================================
# HTTP to HTTPS redirect
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name 2bot.org www.2bot.org admin.2bot.org api.2bot.org;
    
    # Health check (allow HTTP for monitoring)
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# Main Domain: 2bot.org & www.2bot.org - User Dashboard
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 2bot.org www.2bot.org;

    # SSL Configuration (using Cloudflare Origin Certificate)
    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_2BOT:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org https://*.telegram.org https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.analyticbot.org https://*.2bot.org wss://*.2bot.org https://telegram.org wss://*.telegram.org ws://localhost:* wss://localhost:* http://localhost:*; frame-src https://telegram.org https://*.telegram.org;" always;

    access_log /var/log/nginx/2bot.org.access.log;
    error_log /var/log/nginx/2bot.org.error.log warn;

    # Health check
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Vite HMR and source files - MUST come before rate limiting
    location ~ ^/(src/|node_modules/|@fs/|@vite/|@id/|__vite) {
        proxy_pass http://2bot_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Exclude Vite dev files from rate limiting (by extension)
    location ~* \.(tsx?|jsx?|css|json|map|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        proxy_pass http://2bot_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # API proxy (for user frontend) - proxies to api.analyticbot.org backend
    location /api/ {
        limit_req zone=2bot_api_limit burst=50 nodelay;
        proxy_pass http://2bot_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # User Frontend - with rate limiting for regular pages
    location / {
        limit_req zone=2bot_general_limit burst=50 nodelay;
        proxy_pass http://2bot_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================================================
# Admin Panel: admin.2bot.org
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.2bot.org;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_2BOT_ADMIN:10m;
    ssl_session_timeout 10m;

    # Security headers for admin
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.analyticbot.org https://*.2bot.org wss://*.2bot.org ws://localhost:* wss://localhost:* http://localhost:*; frame-ancestors 'self';" always;

    access_log /var/log/nginx/admin.2bot.org.access.log;
    error_log /var/log/nginx/admin.2bot.org.error.log warn;

    # Health check
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Vite HMR and source files
    location ~ ^/(src/|node_modules/|@fs/|@vite/|@id/|__vite) {
        proxy_pass http://2bot_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # API proxy for admin - with rate limiting for auth endpoints
    location /api/v1/auth/ {
        limit_req zone=2bot_auth_limit burst=10 nodelay;
        proxy_pass http://2bot_api/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Admin-Request "true";
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API proxy for admin - general endpoints
    location /api/ {
        limit_req zone=2bot_api_limit burst=30 nodelay;
        proxy_pass http://2bot_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Admin-Request "true";
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin frontend
    location / {
        limit_req zone=2bot_general_limit burst=30 nodelay;
        proxy_pass http://2bot_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================================================
# api.2bot.org - API Backend Alias (proxies to same backend as api.analyticbot.org)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.2bot.org;

    # SSL Configuration (same certificate covers *.2bot.org)
    ssl_certificate /etc/nginx/ssl/2bot.crt;
    ssl_certificate_key /etc/nginx/ssl/2bot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers for API
    add_header Access-Control-Allow-Origin "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Admin-Request" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "3600" always;

    # Handle preflight requests - return early before location processing
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Root endpoint - API info
    location = / {
        limit_req zone=2bot_general_limit burst=10 nodelay;
        proxy_pass http://2bot_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
    }

    # API endpoints
    location / {
        limit_req zone=2bot_api_limit burst=50 nodelay;
        proxy_pass http://2bot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
