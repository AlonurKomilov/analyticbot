# ============================================================================
# AnalyticBot - Moderator Dashboard Nginx Configuration
# Domain: moderator.analyticbot.org
# Purpose: Catalog moderation interface (channel approval, categories, reports)
# Port: 11330 (development), static files (production)
# Created: December 15, 2025
# ============================================================================

# ============================================================================
# HTTPS Moderator Server
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name moderator.analyticbot.org;

    # ========================================================================
    # SSL Configuration (Let's Encrypt / Cloudflare)
    # ========================================================================
    ssl_certificate /etc/letsencrypt/live/analyticbot.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analyticbot.org/privkey.pem;
    # For Cloudflare Full mode, use:
    # ssl_certificate /etc/nginx/ssl/analyticbot.crt;
    # ssl_certificate_key /etc/nginx/ssl/analyticbot.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========================================================================
    # Security Headers (Strict for Moderator Panel)
    # ========================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Stricter CSP for moderator panel (no external scripts)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://*.analyticbot.org wss://*.analyticbot.org; frame-ancestors 'none';" always;

    # ========================================================================
    # Logging
    # ========================================================================
    access_log /var/log/nginx/moderator.analyticbot.org.access.log;
    error_log /var/log/nginx/moderator.analyticbot.org.error.log warn;

    # ========================================================================
    # Health Check
    # ========================================================================
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # API Proxy (Moderator endpoints)
    # ========================================================================
    location /api/ {
        proxy_pass http://127.0.0.1:11400/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================================================
    # Development Mode - Proxy to Vite dev server
    # Uncomment this section for development, comment out production section
    # ========================================================================
    # location / {
    #     proxy_pass http://127.0.0.1:11330;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_cache_bypass $http_upgrade;
    # }

    # ========================================================================
    # Production Mode - Static Files
    # ========================================================================
    root /var/www/analyticbot/moderator;
    index index.html;
    charset utf-8;

    # Static assets with long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Manifest and config files
    location ~* \.(json|webmanifest|xml)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.ico {
        expires 30d;
        add_header Cache-Control "public";
        log_not_found off;
        access_log off;
    }

    # Moderator SPA - All routes
    location / {
        try_files $uri $uri/ /index.html;

        # No caching for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}

# ============================================================================
# HTTP to HTTPS Redirect
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name moderator.analyticbot.org;

    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
