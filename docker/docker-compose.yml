services:
  db:
    image: postgres:16-alpine
    container_name: analyticbot-db
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-abclegacyllc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-analyticbot_v2}
    ports:
      - "10100:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-abclegacyllc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: analyticbot-redis
    ports:
      - "10200:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
