# ============================================================================
# Bot Subdomain: bot.analyticbot.org - Telegram Webhook
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bot.analyticbot.org;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/analyticbot.crt;
    ssl_certificate_key /etc/nginx/ssl/analyticbot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Logging
    access_log /var/log/nginx/bot.analyticbot.org.access.log;
    error_log /var/log/nginx/bot.analyticbot.org.error.log;

    # Telegram webhook endpoint
    location /webhook/telegram {
        proxy_pass http://api_backend/webhook/telegram;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type "application/json";
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Block all other requests
    location / {
        return 404;
    }
}

# ============================================================================
# Default - Catch all for direct IP access
# ============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/analyticbot.crt;
    ssl_certificate_key /etc/nginx/ssl/analyticbot.key;

    # Return 444 for unknown hosts
    return 444;
}
