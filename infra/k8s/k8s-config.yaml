# ConfigMap for AnalyticBot K8s Deployment
# Environment variables for the application

apiVersion: v1
kind: ConfigMap
metadata:
  name: analyticbot-config
  namespace: analyticbot
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  PYTHONPATH: "/app"
  PYTHONUNBUFFERED: "1"
  # Database connection - points to host
  DATABASE_HOST: "10.43.0.1"
  DATABASE_PORT: "10100"
  DATABASE_NAME: "analytic_bot"
  DATABASE_USER: "analytic"
  # Redis connection - points to host
  REDIS_HOST: "10.43.0.1"
  REDIS_PORT: "10200"
  REDIS_DB: "0"
  # JWT Settings
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  # API Settings
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "2"
---
apiVersion: v1
kind: Secret
metadata:
  name: analyticbot-secrets
  namespace: analyticbot
type: Opaque
stringData:
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  JWT_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"
  TELEGRAM_BOT_TOKEN: "CHANGE_ME_IN_PRODUCTION"
  # Full DATABASE_URL will be constructed by the app or entrypoint
